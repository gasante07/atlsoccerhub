name: CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort
          pip install -r requirements.txt
      
      - name: Check code formatting with Black
        run: |
          black --check --diff api/ || true
      
      - name: Check import sorting with isort
        run: |
          isort --check-only --diff api/ || true
      
      - name: Lint with flake8
        run: |
          flake8 api/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 api/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        continue-on-error: true

  security:
    name: Security Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Check for exposed secrets
        run: |
          # Check for common secret patterns
          if grep -r "api[_-]key\s*=\s*[a-zA-Z0-9]\{20,\}" --include="*.py" --include="*.txt" --include="*.json" .; then
            echo "⚠️ Potential API keys found in code. Review manually."
            exit 1
          fi
        continue-on-error: true
      
      - name: Check for default secrets
        run: |
          if grep -r "dev-secret-key-change-in-production" --include="*.py" api/; then
            echo "⚠️ Default secret key found. This should not be in production code."
            exit 1
          fi

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov
      
      - name: Run tests
        run: |
          pytest tests/ -v --cov=api --cov-report=xml || true
        continue-on-error: true
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
        continue-on-error: true

  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [lint, security]
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Validate configuration
        run: |
          python -c "from src.config.config_loader import load_config; config = load_config(); print('Config loaded successfully')"
        env:
          ENV: development
          PEXELS_API_KEY: test-key-placeholder
          PIXABAY_API_KEY: test-key-placeholder
      
      - name: Check file structure
        run: |
          test -f generate.py || exit 1
          test -f api/app.py || exit 1
          test -f requirements.txt || exit 1
          echo "✅ Required files present"
